kind = "web"
previewPath = "/"
title = "Cyber Defender"
version = "1.0.0"
id = "artifacts/cyber-defender"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26270

[services.development]
run = "pnpm --filter @workspace/cyber-defender run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-defender", "run", "build" ]
publicDir = "artifacts/cyber-defender/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26270"
BASE_PATH = "/"
